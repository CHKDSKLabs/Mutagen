name: Harness Dev

on:
  push:
    paths:
      - ".github/workflows/harness-dev.yml"
      - "harness/**"
      - "plugins/mutagen/**"
  pull_request:
    paths:
      - ".github/workflows/harness-dev.yml"
      - "harness/**"
      - "plugins/mutagen/**"

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: harness

      - name: Check formatting
        run: cargo fmt --manifest-path harness/Cargo.toml --check

      - name: Lint with clippy (deny on any warning)
        run: cargo clippy --manifest-path harness/Cargo.toml --all-targets -- -D warnings

      - name: Check plugin scripts
        run: |
          bash -n plugins/mutagen/scripts/*.sh
          bash -n plugins/mutagen/bin/*.sh

      - name: Run harness tests
        run: cargo test --manifest-path harness/Cargo.toml

      - name: Build packaged harness binary
        run: bash plugins/mutagen/scripts/build_harness_binary.sh --debug

      - name: Smoke project dashboard JSON snapshot
        run: |
          set -euo pipefail
          workspace_root="$(mktemp -d)"

          cargo run --quiet --manifest-path harness/Cargo.toml -- project create \
            --workspace-root "$workspace_root" \
            --name smoke-app \
            --stack vite-express-sqlite \
            --design-system plain-css

          cargo run --quiet --manifest-path harness/Cargo.toml -- project dashboard \
            --workspace-root "$workspace_root" >"$workspace_root/dashboard.json"

          jq -e '.ok == true' "$workspace_root/dashboard.json" >/dev/null
