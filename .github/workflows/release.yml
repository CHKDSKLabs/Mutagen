name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach binaries to (e.g. v0.3.0). Must already exist."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            archive: tar.gz
            binary: mutagen-harness
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
            archive: tar.gz
            binary: mutagen-harness
            linker: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          - target: x86_64-apple-darwin
            runs-on: macos-latest
            archive: tar.gz
            binary: mutagen-harness
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            archive: tar.gz
            binary: mutagen-harness
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            archive: zip
            binary: mutagen-harness.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: harness
          key: release-${{ matrix.target }}

      - name: Install cross-linker (Linux aarch64 only)
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Build release binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: |
          cargo build \
            --manifest-path harness/Cargo.toml \
            --release \
            --target ${{ matrix.target }}

      - name: Stage artifact (Linux / macOS)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          stage="$(mktemp -d)"
          name="mutagen-harness-${{ steps.tag.outputs.name }}-${{ matrix.target }}"
          mkdir -p "$stage/$name"
          cp "harness/target/${{ matrix.target }}/release/${{ matrix.binary }}" "$stage/$name/"
          cp LICENSE README.md "$stage/$name/"
          (cd "$stage" && tar -czf "$name.tar.gz" "$name")
          mkdir -p dist
          mv "$stage/$name.tar.gz" dist/
          (cd dist && shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256")

      - name: Stage artifact (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          set -euo pipefail
          stage="$(mktemp -d)"
          name="mutagen-harness-${{ steps.tag.outputs.name }}-${{ matrix.target }}"
          mkdir -p "$stage/$name"
          cp "harness/target/${{ matrix.target }}/release/${{ matrix.binary }}" "$stage/$name/"
          cp LICENSE README.md "$stage/$name/"
          (cd "$stage" && 7z a -tzip "$name.zip" "$name")
          mkdir -p dist
          mv "$stage/$name.zip" dist/
          (cd dist && sha256sum "$name.zip" > "$name.zip.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mutagen-harness-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
